<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiiiGa 選物</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: "ChenYuLuoYan";
  src: url("https://cdn.jsdelivr.net/gh/Chenyu-otf/chenyuluoyan_thin@main/ChenyuLuoyanBrush.otf") format("opentype");
  font-weight: normal;
  font-style: normal;
  font-display: swap;
}
</style>
<style>
/* ─── TOKENS ─────────────────────────────────────── */
:root{
  --cream:#EAE8DF;
  --paper:#F2F0E8;
  --ink:#2B4A7A;
  --ink2:#1E3A62;
  --muted:#7A9BBF;
  --rule:#C8D4E4;
  --gold:#4A7DB5;
  --gold-lt:#7EB3E8;
  --r:2px;
  --tr:.26s ease;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Serif TC',serif;background:var(--cream);color:var(--ink);min-height:100vh;font-size:13px;-webkit-font-smoothing:antialiased;}

/* ─── TOP BAR ─────────────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:52px;padding:0 32px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(247,244,240,0.88);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--rule);
  transition:background var(--tr);
}
.tb-logo{
  font-family:'ChenYuLuoYan','Noto Serif TC',serif;
  font-size:19px;font-weight:300;letter-spacing:.22em;text-transform:uppercase;cursor:pointer;
  display:flex;align-items:baseline;gap:1px;user-select:none;
}
.tb-logo .em{font-style:italic;color:var(--gold);}
.tb-right{display:flex;align-items:center;gap:6px;}

/* ─── BUTTONS ─────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:var(--r);font-family:'Noto Serif TC',serif;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all var(--tr);border:none;outline:none;}
.btn-ink{background:var(--ink);color:var(--cream);}
.btn-ink:hover{background:var(--ink2);}
.btn-line{background:transparent;color:var(--ink);border:1px solid var(--rule);}
.btn-line:hover{border-color:var(--ink);}
.btn-ghost{background:transparent;color:var(--muted);border:none;}
.btn-ghost:hover{color:var(--ink);}
.btn-s{padding:5px 11px;font-size:10px;}
.btn-danger{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;}
.btn-danger:hover{background:#fee2e2;}
.i-btn{width:30px;height:30px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all var(--tr);font-size:13px;}
.i-btn:hover{background:var(--rule);color:var(--ink);}

/* ─── HERO ─────────────────────────────────────────── */
#hero{
  position:relative;min-height:65vh;
  display:flex;flex-direction:column;justify-content:flex-end;
  overflow:hidden;background:var(--ink);
  cursor:default;
}
#hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .6s;}
#hero-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,32,58,.92) 0%,rgba(20,32,58,.35) 50%,transparent 100%);}
#hero-content{position:relative;z-index:2;padding:clamp(24px,4vw,44px) clamp(28px,5vw,64px) clamp(32px,5vw,56px);}
.hero-label{font-family:'Noto Serif TC',serif;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.hero-h{
  font-family:'ChenYuLuoYan','Noto Serif TC',serif;
  font-size:clamp(32px,4.5vw,60px);
  font-weight:700;line-height:1.1;color:#fff;
  letter-spacing:.02em;margin-bottom:0;
}
.hero-h em{font-style:italic;color:var(--gold-lt);}
.hero-sub{font-size:12px;line-height:2;color:rgba(255,255,255,.5);font-weight:300;max-width:380px;margin-top:16px;}
.hero-ph{
  position:absolute;inset:0;
  background:linear-gradient(145deg,#201c18 0%,#0f1e38 100%);
  display:flex;align-items:center;justify-content:center;
}
.hero-ph-word{
  font-family:'Noto Serif TC',serif;font-weight:200;
  font-size:clamp(80px,14vw,180px);letter-spacing:.4em;
  color:rgba(255,255,255,.04);text-transform:uppercase;
  user-select:none;
}
.hero-scroll{
  position:absolute;bottom:28px;right:32px;z-index:3;
  display:flex;align-items:center;gap:8px;
  font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35);
  cursor:pointer;transition:color var(--tr);
}
.hero-scroll:hover{color:rgba(255,255,255,.65);}
.hero-scroll-line{width:32px;height:1px;background:currentColor;}
.hero-edit-fab{
  position:absolute;top:72px;right:20px;z-index:3;
  padding:5px 12px;border-radius:var(--r);
  background:rgba(255,255,255,.1);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.7);
  font-size:10px;font-family:'Noto Serif TC',serif;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:all var(--tr);
}
.hero-edit-fab:hover{background:rgba(255,255,255,.2);color:#fff;}

/* ─── SECTION HEADER ──────────────────────────────── */
.section-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:52px 32px 28px;gap:20px;flex-wrap:wrap;
  border-bottom:1px solid var(--rule);
}
.section-hd-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.section-title{
  font-family:'ChenYuLuoYan','Noto Serif TC',serif;
  font-size:13px;font-weight:400;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
}
.section-divider{width:28px;height:1px;background:var(--rule);}

/* ─── STATUS SWITCH ────────────────────────────────── */
.sw-wrap{display:flex;align-items:center;gap:10px;}
.sw-lbl{font-size:11px;letter-spacing:.06em;color:var(--muted);transition:color var(--tr);white-space:nowrap;}
.sw-lbl.lit{color:var(--ink);font-weight:500;}
.sw-track{width:44px;height:24px;border-radius:100px;background:var(--rule);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0;border:1px solid transparent;}
.sw-track.on{background:var(--ink);}
.sw-thumb{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .28s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 3px rgba(0,0,0,.18);}
.sw-track.on .sw-thumb{transform:translateX(20px);}
.sw-n{font-size:10px;color:var(--muted);margin-left:1px;}

/* ─── CAT PILLS ────────────────────────────────────── */
.cat-strip{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.cpill{padding:4px 12px;border-radius:100px;border:1px solid var(--rule);background:transparent;font-family:'Noto Serif TC',serif;font-size:10px;letter-spacing:.08em;cursor:pointer;color:var(--muted);transition:all var(--tr);text-transform:uppercase;display:inline-flex;align-items:center;gap:3px;}
.cpill:hover,.cpill.on{background:var(--ink);color:var(--cream);border-color:var(--ink);}
.cpill-x{opacity:0;font-size:9px;margin-left:1px;transition:opacity .15s;}
.cpill:hover .cpill-x,.cpill.on .cpill-x{opacity:1;}
.cpill-x:hover{color:#f87171;}
.cat-add{padding:4px 10px;border-radius:100px;border:1px dashed var(--rule);background:transparent;font-size:10px;color:var(--muted);cursor:pointer;transition:all var(--tr);font-family:'Noto Serif TC',serif;letter-spacing:.06em;}
.cat-add:hover{border-color:var(--gold);color:var(--gold);}
.cnt{font-size:11px;color:var(--muted);white-space:nowrap;}

/* ─── ZUKAN GRID ───────────────────────────────────── */
#zukan{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;
  background:var(--rule);
}

/* ─── CARD ─────────────────────────────────────────── */
.zcard{background:var(--paper);position:relative;cursor:pointer;overflow:hidden;transition:transform var(--tr);}
.zcard:hover{z-index:2;transform:scale(1.012);}
.zcard:hover .zc-ph{transform:scale(1.07);}
.zcard:hover .zc-overlay{opacity:1;}

.zc-vis{aspect-ratio:1/1;overflow:hidden;position:relative;background:var(--rule);}
.zc-img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;}
.zc-ph{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#D8E4F0 0%,#C4D6EB 100%);
  font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:64px;font-style:italic;
  color:#99BDD8;transition:transform .7s ease;
  letter-spacing:-.02em;
}
.zc-overlay{
  position:absolute;inset:0;background:rgba(20,32,58,.48);
  opacity:0;transition:opacity .3s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.ov-b{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.12);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.25);color:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all var(--tr);font-size:14px;
}
.ov-b:hover{background:rgba(255,255,255,.25);transform:scale(1.1);}

/* badges */
.zc-cat{position:absolute;top:12px;left:12px;padding:2px 9px;border-radius:100px;background:rgba(247,244,240,.88);backdrop-filter:blur(4px);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);font-weight:500;}
.zc-dot{position:absolute;top:12px;right:12px;width:8px;height:8px;border-radius:50%;}
.zc-dot.tried{background:var(--gold);box-shadow:0 0 0 3px rgba(74,125,181,.22);}
.zc-dot.not-tried{background:rgba(255,255,255,.5);border:1.5px solid rgba(255,255,255,.55);}
.zc-multi{position:absolute;bottom:10px;right:10px;padding:2px 7px;border-radius:100px;background:rgba(20,32,58,.48);font-size:9px;color:rgba(255,255,255,.8);}

/* card text area */
.zc-body{padding:12px 14px 16px;border-top:1px solid var(--rule);}
.zc-idx{font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:10px;font-style:italic;color:var(--muted);margin-bottom:4px;letter-spacing:.06em;}
.zc-name{font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:16px;font-weight:700;letter-spacing:.03em;margin-bottom:5px;line-height:1.2;}
.zc-line{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.zc-url{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:3px;transition:gap var(--tr);}
.zc-url:hover{gap:6px;}

/* ─── EMPTY ─────────────────────────────────────────── */
.empty{grid-column:1/-1;background:var(--paper);padding:100px 40px;text-align:center;}
.empty-t{font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:28px;font-weight:300;color:var(--muted);margin-bottom:8px;}
.empty-s{font-size:12px;color:var(--muted);}

/* ─── FOOTER ─────────────────────────────────────────── */
footer{padding:40px 32px;border-top:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-logo{font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.footer-note{font-size:10px;letter-spacing:.06em;color:var(--muted);}

/* ─── MODALS ─────────────────────────────────────────── */
.mback{display:none;position:fixed;inset:0;background:rgba(20,32,58,.65);z-index:400;backdrop-filter:blur(6px);}
.mback.open{display:flex;align-items:center;justify-content:center;padding:20px;animation:mfade .2s ease;}
@keyframes mfade{from{opacity:0}to{opacity:1}}
@keyframes mup{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal{background:var(--paper);width:100%;max-width:600px;max-height:92vh;overflow-y:auto;animation:mup .24s ease;border-radius:var(--r);}
.m-hd{display:flex;align-items:center;justify-content:space-between;padding:24px 28px 0;}
.m-ttl{font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:21px;font-weight:700;letter-spacing:.04em;}
.m-bd{padding:20px 28px 28px;}
.m-ft{display:flex;gap:10px;justify-content:flex-end;padding:14px 28px;border-top:1px solid var(--rule);}

/* FORM */
.field{margin-bottom:18px;}
.flbl{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:500;}
input[type="text"],input[type="url"],textarea,select{width:100%;padding:10px 14px;border:1px solid var(--rule);border-radius:var(--r);background:var(--cream);font-family:'Noto Serif TC',serif;font-size:13px;color:var(--ink);outline:none;transition:border-color var(--tr);}
input:focus,textarea:focus,select:focus{border-color:var(--ink);}
textarea{resize:vertical;min-height:80px;}

/* status seg */
.st-seg{display:flex;border:1px solid var(--rule);border-radius:var(--r);overflow:hidden;}
.st-opt{flex:1;padding:10px;background:transparent;border:none;font-family:'Noto Serif TC',serif;font-size:12px;cursor:pointer;color:var(--muted);transition:all var(--tr);text-align:center;}
.st-opt:not(:last-child){border-right:1px solid var(--rule);}
.st-opt.on{background:var(--ink);color:var(--cream);}
.st-opt:hover:not(.on){background:var(--cream);}

/* img grid */
.ig{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:8px;}
.ig-th{aspect-ratio:1;position:relative;border-radius:var(--r);overflow:hidden;background:var(--rule);}
.ig-th img{width:100%;height:100%;object-fit:cover;display:block;}
.ig-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(20,32,58,.7);color:#fff;border:none;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;}
.ig-th:hover .ig-del{opacity:1;}
.ig-cover{position:absolute;bottom:3px;left:3px;padding:2px 5px;border-radius:100px;background:rgba(184,155,110,.88);font-size:8px;color:#fff;letter-spacing:.04em;}
.ig-add{aspect-ratio:1;border:1.5px dashed var(--rule);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;background:transparent;transition:all var(--tr);color:var(--muted);font-size:10px;font-family:'Noto Serif TC',serif;}
.ig-add:hover{border-color:var(--ink);color:var(--ink);}
.ig-add-ic{font-size:17px;opacity:.3;line-height:1;}
.url-row{display:flex;gap:7px;}
.url-row input{flex:1;}

/* visual upload */
.vis-area{border:1.5px dashed var(--rule);border-radius:var(--r);overflow:hidden;position:relative;cursor:pointer;transition:border-color var(--tr);}
.vis-area:hover{border-color:var(--ink);}
.vis-ph{width:100%;height:180px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#201c18,#0f1e38);font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:40px;font-style:italic;color:rgba(255,255,255,.05);}
.vis-prev{width:100%;max-height:240px;object-fit:contain;display:block;background:#111;}
.vis-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(20,32,58,.38);opacity:0;transition:opacity .2s;}
.vis-area:hover .vis-ov{opacity:1;}
.vis-hint{color:#fff;font-size:11px;letter-spacing:.08em;}

/* hero editor area (reuse vis styles) */
.hero-img-area{border:1.5px dashed var(--rule);border-radius:var(--r);overflow:hidden;position:relative;cursor:pointer;transition:border-color var(--tr);}
.hero-img-area:hover{border-color:var(--ink);}
.hero-img-ph{width:100%;height:160px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#201c18,#0f1e38);font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:36px;font-style:italic;color:rgba(255,255,255,.05);}
.hero-img-prev{width:100%;height:160px;object-fit:cover;display:block;}
.hero-img-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(20,32,58,.38);opacity:0;transition:opacity .2s;}
.hero-img-area:hover .hero-img-ov{opacity:1;}
.hero-img-hint{color:#fff;font-size:11px;letter-spacing:.08em;}

/* cat manager */
.cmgr-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;min-height:36px;}
.cmgr-pill{padding:5px 12px;border-radius:100px;background:var(--cream);border:1px solid var(--rule);font-size:11px;display:inline-flex;align-items:center;gap:5px;}
.cmgr-del{cursor:pointer;color:var(--muted);font-size:11px;transition:color .15s;}
.cmgr-del:hover{color:#b91c1c;}
.cnew{display:flex;gap:7px;}
.cnew input{flex:1;}

/* share */
.sh-row{display:flex;gap:7px;align-items:center;}
.sh-row input{flex:1;font-size:11px;color:var(--muted);}
.sh-ok{font-size:11px;color:var(--gold);margin-top:5px;opacity:0;transition:opacity .3s;}
.sh-ok.show{opacity:1;}
.sh-prev{margin-top:14px;padding:14px;background:var(--cream);border:1px solid var(--rule);border-radius:var(--r);}
.sh-prev h4{font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:14px;font-weight:400;margin-bottom:3px;}
.sh-prev p{font-size:11px;color:var(--muted);}

/* ─── DRAWER ─────────────────────────────────────────── */
.dr-back{display:none;position:fixed;inset:0;background:rgba(20,32,58,.5);z-index:500;backdrop-filter:blur(3px);}
.dr-back.open{display:block;animation:mfade .2s;}
.drawer{
  position:fixed;top:0;right:0;bottom:0;width:460px;max-width:92vw;
  background:var(--paper);z-index:501;overflow-y:auto;
  transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  box-shadow:-12px 0 60px rgba(20,32,58,.16);
}
.drawer.open{transform:translateX(0);}

/* Drawer carousel — tall portrait */
.dr-car{position:relative;flex-shrink:0;background:var(--ink);overflow:hidden;}
.dr-vp{overflow:hidden;}
.dr-track{display:flex;transition:transform .4s ease;}
.dr-slide{flex:0 0 100%;}
.dr-slide img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;opacity:.9;}
.dr-ph{aspect-ratio:3/2;display:flex;align-items:center;justify-content:center;font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:96px;font-style:italic;color:rgba(255,255,255,.05);}
.dr-arr{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);backdrop-filter:blur(4px);color:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--tr);}
.dr-arr:hover{background:rgba(255,255,255,.2);}
.dr-arr.p{left:12px;}.dr-arr.n{right:12px;}.dr-arr.h{display:none;}
.dr-dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:5px;}
.ddot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:all var(--tr);}
.ddot.on{background:#fff;transform:scale(1.5);}

/* Drawer body */
.dr-body{padding:20px 24px 40px;flex:1;}
.dr-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.dr-name{font-family:'ChenYuLuoYan','Noto Serif TC',serif;font-size:clamp(22px,3vw,30px);font-weight:700;letter-spacing:.02em;line-height:1.1;flex:1;}
.dr-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--rule);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;transition:all var(--tr);flex-shrink:0;margin-left:14px;margin-top:4px;}
.dr-close:hover{background:var(--rule);color:var(--ink);}
.dr-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:24px;}
.dr-cat{padding:2px 9px;border-radius:100px;background:var(--cream);border:1px solid var(--rule);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.dr-st{padding:2px 9px;border-radius:100px;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
.dr-st.tried{background:rgba(184,155,110,.1);color:#8B6F3E;border:1px solid rgba(184,155,110,.3);}
.dr-st.not-tried{background:var(--cream);color:var(--muted);border:1px solid var(--rule);}
.dr-rule{height:1px;background:var(--rule);margin:18px 0;}
.dr-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:8px;}
.dr-txt{font-size:12px;line-height:1.8;color:var(--ink2);}
.dr-note{font-size:12px;line-height:1.8;color:var(--muted);font-style:italic;}
.dr-link{display:inline-flex;align-items:center;gap:5px;color:var(--gold);font-size:12px;text-decoration:none;font-weight:500;letter-spacing:.04em;transition:gap var(--tr);}
.dr-link:hover{gap:9px;}

/* Drawer visual — full bleed */
.dr-vis{margin:16px -24px 0;position:relative;}
.dr-vis img{width:100%;display:block;max-height:700px;object-fit:contain;background:#0f1e38;}
.dr-vis-cap{padding:8px 24px;font-size:11px;color:var(--muted);font-style:italic;line-height:1.6;}

.dr-actions{display:flex;gap:8px;margin-top:28px;flex-wrap:wrap;}


/* Lang toggle */
.lang-btn{padding:4px 10px;border-radius:100px;border:1px solid var(--rule);background:transparent;font-family:'Noto Serif TC',serif;font-size:10px;letter-spacing:.1em;cursor:pointer;color:var(--muted);transition:all var(--tr);}
.lang-btn:hover{border-color:var(--ink);color:var(--ink);}

/* ─── TOAST ─────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1E3A62;color:#EAE8DF;padding:10px 22px;border-radius:100px;font-size:11px;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;letter-spacing:.04em;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ─── ADMIN LOCK ─────────────────────────────────────── */
#lockScreen{position:fixed;inset:0;z-index:900;background:rgba(20,32,58,.96);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;animation:mfade .3s ease;}
#lockScreen.hidden{display:none;}
.lock-box{background:var(--paper);border-radius:4px;width:100%;max-width:360px;padding:40px 36px 36px;text-align:center;animation:mup .3s ease;}
.lock-logo{font-family:"ChenYuLuoYan","Noto Serif TC",serif;font-size:26px;font-weight:300;letter-spacing:.22em;text-transform:uppercase;margin-bottom:6px;}
.lock-logo .em{font-style:italic;color:var(--gold);}
.lock-sub{font-size:11px;color:var(--muted);letter-spacing:.06em;margin-bottom:28px;}
.lock-input-wrap{position:relative;margin-bottom:8px;}
.lock-input{width:100%;padding:11px 40px 11px 14px;border:1px solid var(--rule);border-radius:var(--r);background:var(--cream);font-family:"Noto Serif TC",serif;font-size:14px;color:var(--ink);outline:none;transition:border-color var(--tr);text-align:center;letter-spacing:.12em;}
.lock-input:focus{border-color:var(--ink);}
.lock-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:2px;transition:color var(--tr);}
.lock-eye:hover{color:var(--ink);}
.lock-err{font-size:11px;color:#b91c1c;min-height:14px;margin-bottom:6px;transition:opacity .2s;}
.lock-err.hidden{opacity:0;}
.lock-note{font-size:10px;color:var(--muted);margin-top:14px;line-height:1.7;letter-spacing:.04em;}
.admin-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:100px;background:rgba(74,125,181,.12);border:1px solid rgba(74,125,181,.3);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:500;}
.lock-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--rule);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;transition:all var(--tr);}
.lock-btn:hover{background:var(--rule);color:var(--ink);}
/* ─── RESPONSIVE ─────────────────────────────────────── */
@media(max-width:480px){
  #topbar{padding:0 20px;}
  #hero-content{padding:32px 20px 48px;}
  .section-hd{padding:36px 20px 20px;}
  #zukan{grid-template-columns:repeat(2,1fr);}
  .drawer{width:100vw;}
  .dr-body{padding:20px 20px 44px;}
  .dr-vis{margin:20px -20px 0;}
  .dr-vis-cap{padding:8px 20px;}
  .ig{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:481px) and (max-width:900px){
  #zukan{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:1400px){
  #zukan{grid-template-columns:repeat(5,1fr);}
}
</style>
</head>

const SB_ROW_ID = 1; // single row stores all data

async function sbGet() {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/siiga_data?id=eq.${SB_ROW_ID}&select=payload`, {
      headers: {'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY}
    });
    if(!r.ok){ console.warn('sbGet error', r.status, await r.text()); return null; }
    const rows = await r.json();
    console.log('sbGet rows:', rows.length);
    if (rows && rows.length && rows[0].payload) return rows[0].payload;
    return null;
  } catch(e) { console.warn('sbGet exception', e); return null; }
}

async function sbSave(data) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/siiga_data`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({id: SB_ROW_ID, payload: data})
    });
    if(!r.ok){ console.warn('sbSave error', r.status, await r.text()); }
    else { console.log('sbSave ok'); toast('☁ 已同步'); }
  } catch(e) { console.warn('sbSave exception', e); }
}

function showLockScreen(){
  document.getElementById('lockPwInput').value='';
  document.getElementById('lockErr').classList.add('hidden');
  document.getElementById('lockScreen').classList.remove('hidden');
  setTimeout(()=>document.getElementById('lockPwInput').focus(),80);
}

function hideLockScreen(){
  document.getElementById('lockScreen').classList.add('hidden');
}

function tryUnlock(){
  const pw=document.getElementById('lockPwInput').value;
  if(btoa(pw)===getPwHash()){
    isAdmin=true;
    hideLockScreen();
    renderTopbar();
    render();
    toast(t('toastWelcome'));
  } else {
    const err=document.getElementById('lockErr');
    err.classList.remove('hidden');
    err.textContent=t('lockErr');
    document.getElementById('lockPwInput').value='';
    document.getElementById('lockPwInput').focus();
  }
}

function lockAdmin(){
  isAdmin=false;
  renderTopbar();
  render();
  toast(t('toastLocked'));
}

function togglePwVis(){
  const inp=document.getElementById('lockPwInput');
  inp.type=inp.type==='password'?'text':'password';
}

function changePassword(){
  const oldPw=document.getElementById('chpw-old').value;
  const newPw=document.getElementById('chpw-new').value;
  const confirm=document.getElementById('chpw-confirm').value;
  const err=document.getElementById('chpwErr');
  err.classList.add('hidden');
  if(btoa(oldPw)!==getPwHash()){err.textContent=t('pwErrOld');err.classList.remove('hidden');return;}
  if(newPw.length<4){err.textContent=t('pwErrLen');err.classList.remove('hidden');return;}
  if(newPw!==confirm){err.textContent=t('pwErrMatch');err.classList.remove('hidden');return;}
  localStorage.setItem('siiga_pw',btoa(newPw));
  closeMod('chpwModal');
  ['chpw-old','chpw-new','chpw-confirm'].forEach(id=>document.getElementById(id).value='');
  toast(t('toastPw'));
}

function renderHero(){
  const title = curLang==='en' ? (hero.title_en||hero.title) : hero.title;
  const sub   = curLang==='en' ? (hero.sub_en||hero.sub)     : hero.sub;
  document.getElementById('hTitle').innerHTML=parseTitle(title);

  if(sub){subEl.textContent=sub;subEl.style.display='';}
  else{subEl.style.display='none';}

  if(hero.bg){bg.style.backgroundImage=`url('${esc(hero.bg)}')`;bg.style.display='';ph.style.display='none';}

    return;
  }
  // show index relative to full filtered list (for catalogue numbering)
  const all=curCat==='all'?brands:brands.filter(b=>b.cat===curCat);
  g.innerHTML=list.map((b,i)=>{
    const cover=b.imgs&&b.imgs.length?b.imgs[0]:null;
    const st=b.status||'not-tried';

    return `
    <div class="zcard" onclick="openDr('${b.id}')">

        <div class="zc-ph" style="${cover||(b.imgs&&b.imgs.length)?'display:none':''}"><span>${b.name.charAt(0)}</span></div>
        <div class="zc-overlay">
          ${b.url?`<div class="ov-b" onclick="event.stopPropagation();window.open('${esc(b.url)}','_blank')" title="官網">↗</div>`:''}
          ${isAdmin?`<div class="ov-b" onclick="event.stopPropagation();openEdit('${b.id}')" title="編輯">✦</div>`:''}
          ${isAdmin?`<div class="ov-b" onclick="event.stopPropagation();delBrand('${b.id}')" title="刪除" style="background:rgba(160,20,20,.22)">×</div>`:''}
        </div>
        ${b.cat?`<span class="zc-cat">${catName(esc(b.cat))}</span>`:''}
        <span class="zc-dot ${st}" title="${st==='tried'?t('dotTried'):t('dotWant')}"></span>
        ${b.imgs&&b.imgs.length>1?`<span class="zc-multi">✦ ${b.imgs.length}</span>`:''}
      </div>
      <div class="zc-body">
        <div class="zc-idx">No. ${String(globalIdx).padStart(2,'0')}</div>
        <div class="zc-name">${esc(curLang==='en'&&b.name_en?b.name_en:b.name)}</div>
        ${(curLang==='en'&&b.desc_en||b.desc)?`<div class="zc-line">${esc(curLang==='en'&&b.desc_en?b.desc_en:b.desc)}</div>`:'<div style="height:6px"></div>'}

/* ── DRAWER ── */
function openDr(id){
  const b=brands.find(b=>b.id===id);if(!b)return;
  drId=id;carI=0;buildDr(b);
  document.getElementById('drBack').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow='hidden';
}
function buildDr(b){
  const imgs=b.imgs||[];
  const car=document.getElementById('drCar');
  if(!imgs.length){
    car.innerHTML=`<div class="dr-ph">${b.name.charAt(0)}</div>`;
  } else {
    car.innerHTML=`
      <div class="dr-vp"><div class="dr-track" id="drTrack">
        ${imgs.map(s=>`<div class="dr-slide"><img src="${s}" alt="${esc(b.name)}"></div>`).join('')}
      </div></div>
      <button class="dr-arr p ${imgs.length<2?'h':''}" onclick="doSlide(-1)">‹</button>
      <button class="dr-arr n ${imgs.length<2?'h':''}" onclick="doSlide(1)">›</button>
      ${imgs.length>1?`<div class="dr-dots">${imgs.map((_,i)=>`<div class="ddot ${i===0?'on':''}" onclick="goSlide(${i})"></div>`).join('')}</div>`:''}`;
  }
  const st=b.status||'not-tried';
  const stLbl=st==='tried'?t('drStatusTried'):t('drStatusWant');
  let h=`
    <div class="dr-top">
      <div class="dr-name">${esc(curLang==='en'&&b.name_en?b.name_en:b.name)}</div>
      <button class="dr-close" onclick="closeDr()">×</button>
    </div>
    <div class="dr-meta">
      ${b.cat?`<span class="dr-cat">${catName(esc(b.cat))}</span>`:''}
      <span class="dr-st ${st}">${stLbl}</span>
    </div>`;
  const dispDesc=curLang==='en'&&b.desc_en?b.desc_en:b.desc;
  if(dispDesc)h+=`<div class="dr-lbl">${t('drAbout')}</div><div class="dr-txt">${esc(dispDesc)}</div><div class="dr-rule"></div>`;
  if(b.url)h+=`<div class="dr-lbl">${t('drSite')}</div><a class="dr-link" href="${esc(b.url)}" target="_blank" rel="noopener">${fmtD(b.url)} →</a><div class="dr-rule"></div>`;
  if(b.note)h+=`<div class="dr-lbl">${t('drNote')}</div><div class="dr-note">${esc(b.note)}</div><div class="dr-rule"></div>`;
  // visual — close body div, full-bleed, reopen
  if(b.visual){
    h+=`</div><div class="dr-vis"><img src="${esc(b.visual)}" alt="選品視覺">`;
    if(b.visualCap)h+=`<div class="dr-vis-cap">${esc(b.visualCap)}</div>`;
    h+=`</div><div style="padding:0 32px 56px">`;
  }
  h+=`<div class="dr-actions">
    ${isAdmin?`<button class="btn btn-line" onclick="closeDr();setTimeout(()=>openEdit('${b.id}'),160)">${t('drEdit')}</button>`:''}
    ${isAdmin?`<button class="btn btn-danger btn-s" onclick="closeDr();setTimeout(()=>delBrand('${b.id}'),160)">${t('drDel')}</button>`:''}
  </div>`;
  document.getElementById('drBody').innerHTML=h;
}
function doSlide(d){const b=brands.find(b=>b.id===drId);if(!b||!b.imgs)return;goSlide((carI+d+b.imgs.length)%b.imgs.length);}
function goSlide(i){carI=i;const t=document.getElementById('drTrack');if(t)t.style.transform=`translateX(-${i*100}%)`;document.querySelectorAll('.ddot').forEach((d,j)=>d.classList.toggle('on',j===i));}
function closeDr(){document.getElementById('drBack').classList.remove('open');document.getElementById('drawer').classList.remove('open');document.body.style.overflow='';drId=null;}

  g.innerHTML=ths+add;
}

/* ── PERSIST ── */
function save(){
  const data={brands,cats,hero,lang:curLang};
  try{localStorage.setItem('siiga_v1',JSON.stringify(data));}catch(e){}
  if(isAdmin) sbSave(data); // sync to cloud only when admin saves
}
function loadLS(){try{const r=localStorage.getItem('siiga_v1');if(r){const d=JSON.parse(r);brands=d.brands||[];cats=d.cats||cats;if(d.hero){const saved=d.hero;if(!saved.bg)saved.bg=HERO_IMG;Object.assign(hero,saved);}if(d.lang)curLang=d.lang;}}catch(e){}}
function loadURL(){
  try{
    const p=new URLSearchParams(location.search);const d=p.get('data');if(!d)return;
    const parsed=JSON.parse(decodeURIComponent(escape(atob(d))));
    brands=parsed.brands||parsed;if(parsed.cats)cats=parsed.cats;if(parsed.hero)Object.assign(hero,parsed.hero);
    save();history.replaceState({},'',location.pathname);
  }catch(e){}
}
function encData(){
  const clean={
    brands:brands.map(b=>{
      const o={id:b.id,name:b.name,cat:b.cat,url:b.url||'',status:b.status||'not-tried',desc:b.desc||''};
      // only include extras if non-empty (keeps URL short)
      if(b.name_en) o.name_en=b.name_en;
      if(b.desc_en) o.desc_en=b.desc_en;
      if(b.imgs&&b.imgs.length) o.imgs=b.imgs.filter(s=>!s.startsWith('data:'));
      if(b.visual&&!b.visual.startsWith('data:')) o.visual=b.visual;
      if(b.visualCap) o.visualCap=b.visualCap;
      return o;
    }),
    cats,
    hero:{eyebrow:hero.eyebrow,title:hero.title,title_en:hero.title_en||'',sub:hero.sub,sub_en:hero.sub_en||'',
      bg:hero.bg&&!hero.bg.startsWith('data:')?hero.bg:''}
  };
  return btoa(unescape(encodeURIComponent(JSON.stringify(clean))));
}


/* ── HOVER SLIDESHOW ── */
const _slides = {};
function startSlide(el, id) {
  const b = brands.find(x=>x.id===id);
  if(!b||!b.imgs||b.imgs.length<2) return;
  const imgs = b.imgs;
  let idx = 0;
  const dur = 1200; // ms per slide
  function goTo(i) {
    idx = i % imgs.length;
    const track = document.getElementById('slides-'+id);
    if(track) track.style.transform = `translateX(-${idx*100}%)`;
    imgs.forEach((_,j)=>{
      const fill = document.getElementById(`prog-${id}-${j}`);
      if(!fill) return;
      fill.style.transition='none'; fill.style.width='0%';
      if(j < idx){ fill.style.transition='none'; fill.style.width='100%'; }
      if(j === idx){
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          fill.style.transition=`width ${dur}ms linear`;
          fill.style.width='100%';
        }));
      }
    });
  }
  goTo(0);
  _slides[id] = setInterval(()=>goTo(++idx), dur);
}
function stopSlide(el,id){clearSlide(id,el);}
function clearSlide(id, el) {
  if(_slides[id]){ clearInterval(_slides[id]); delete _slides[id]; }
  const track = document.getElementById('slides-'+id);
  if(track){ track.style.transition='none'; track.style.transform='translateX(0)'; }
  const b = brands.find(x=>x.id===id);
  if(b&&b.imgs) b.imgs.forEach((_,j)=>{
    const fill = document.getElementById(`prog-${id}-${j}`);
    if(fill){fill.style.transition='none';fill.style.width='0%';}
  });
}

function uid(){return Math.random().toString(36).slice(2,10);}
function fmtD(u){try{return new URL(u).hostname.replace('www.','');}catch(e){return u;}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
function openMod(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden';}
function closeMod(id){document.getElementById(id).classList.remove('open');document.body.style.overflow='';if(id==='addModal')clearForm();}
document.querySelectorAll('.mback').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)closeMod(el.id);}));
